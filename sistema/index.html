  .contact-item{background:rgba(255,255,255,.1);border-radius:10px;padding:10px 12px;font-size:12px;line-height:1.5;}
  .contact-label{opacity:.7;font-size:11px;margin-bottom:2px;}
  /* BADGE STATUS */
  .badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:600;}
  /* CARD */
  .card{background:white;border-radius:16px;border:1px solid #e6dfd0;padding:20px;margin-bottom:12px;}
  .section-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#8a8478;margin-bottom:12px;font-weight:600;}
  /* CLIENTE */
  .client-name{font-size:22px;margin-bottom:6px;}
  .client-info{font-size:13px;color:#57534e;line-height:1.7;}
  /* INFO GRID */
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .info-box{background:#f4efe6;border-radius:10px;padding:12px;}
  .info-box .lbl{font-size:11px;color:#8a8478;margin-bottom:3px;}
  .info-box .val{font-size:14px;font-weight:600;}
  /* ITENS */
  .item-row{background:#f4efe6;border-radius:12px;padding:14px 16px;margin-bottom:10px;}
  .item-name{font-size:15px;font-weight:600;margin-bottom:4px;}
  .item-detail{font-size:13px;color:#57534e;margin-bottom:10px;line-height:1.5;}
  .item-footer{display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid #e6dfd0;padding-top:10px;}
  .item-price-unit{font-size:12px;color:#8a8478;}
  .item-price-total{font-size:18px;font-weight:700;color:#2d4a2b;}
  /* TOTAIS */
  .total-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f4efe6;font-size:14px;}
  .total-row:last-child{border-bottom:none;}
  .total-final{background:#2d4a2b;border-radius:12px;padding:16px 18px;margin-top:10px;}
  .total-final-lbl{color:rgba(255,255,255,.75);font-size:12px;margin-bottom:4px;}
  .total-final-val{color:white;font-size:26px;font-weight:700;}
  .saldo-box{background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;padding:14px 16px;margin-top:10px;display:flex;justify-content:space-between;align-items:center;}
  .saldo-lbl{font-size:13px;color:#92400e;}
  .saldo-val{font-size:20px;font-weight:700;color:#c4632a;}
  /* OBS */
  .obs-text{font-size:14px;line-height:1.7;color:#57534e;white-space:pre-wrap;}
  /* RODAP\xC9 */
  .footer{text-align:center;margin-top:28px;font-size:12px;color:#8a8478;line-height:1.8;}
  .footer strong{color:#2d4a2b;}
  /* BOT\xC3O IMPRIMIR */
  .print-bar{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e6dfd0;padding:14px 20px;display:flex;gap:10px;z-index:99;}
  .btn-print{flex:1;padding:13px;border-radius:12px;background:#2d4a2b;color:white;font-weight:700;font-size:15px;border:none;cursor:pointer;font-family:inherit;}
  .btn-share{padding:13px 18px;border-radius:12px;background:#f4efe6;color:#1a1a17;font-weight:600;font-size:15px;border:1px solid #e6dfd0;cursor:pointer;font-family:inherit;}

<div class="wrap">

  <!-- CABE\xC7ALHO VERDE -->
  <div class="header">
    <div class="logo-row">
      <div class="logo-ico">\u2702\uFE0F</div>
      <div>
        <div class="fd logo-name">Malharia Queiroz</div>
        <div class="logo-sub">Uniformes &amp; Camisetas Premium</div>
      </div>
    </div>
    <div class="contact-grid">
      <div class="contact-item"><div class="contact-label">WhatsApp</div>(94) 99132-2940</div>
      <div class="contact-item"><div class="contact-label">Instagram</div>@malhariaqueiroz2024</div>
      <div class="contact-item"><div class="contact-label">E-mail</div>malharia.queiroz03@gmail.com</div>
      <div class="contact-item"><div class="contact-label">Endere\xE7o</div>Vila Taboca, R. Belo Horizonte<br/>S\xE3o F\xE9lix do Xingu \u2014 PA</div>

  </div>

  <!-- T\xCDTULO DO DOCUMENTO -->

    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;">

      <div class="badge" style="background:${o.bg};color:${o.text};">

        ${o.label}

    </div>
    <div class="info-grid">

  <!-- CLIENTE -->
  <div class="card">

      ${a?.email?`\u2709\uFE0F ${a.email}<br/>`:""}
      ${a?.city?`\u{1F4CD} ${a.city}`:""}
    </div>
  </div>

  <!-- ITENS -->
  <div class="card">
    <div class="section-label">Itens do pedido</div>
    ${m.map(v=>`
    <div class="item-row">
      <div class="item-name">${v.name}</div>
      <div class="item-detail">
        <strong>${v.qty} pe\xE7as</strong>${v.sizes&&v.sizes!=="\u2014"?` &nbsp;\xB7&nbsp; Grade: ${v.sizes}`:""}

      <div class="item-footer">
        <div class="item-price-unit">${w(v.unit)} por pe\xE7a</div>
        <div class="item-price-total">${w(v.sub)}</div>
      </div>
    </div>`).join("")}
  </div>

  <!-- PAGAMENTO -->
  <div class="card">
    <div class="section-label">Pagamento</div>
    <div class="total-final">
      <div class="total-final-lbl">Valor total do pedido</div>
      <div class="fd total-final-val">${w(p)}</div>
    </div>
    ${i.amountPaid>0?`
    <div class="total-row" style="margin-top:12px;">
      <span style="color:#57534e;">Valor recebido</span>
      <span style="font-weight:600;color:#2d4a2b;">${w(i.amountPaid)}</span>
    </div>`:""}
    ${c>0?`
    <div class="saldo-box">
      <div>
        <div class="saldo-lbl" style="font-weight:600;">Saldo a pagar</div>
        <div style="font-size:12px;color:#92400e;margin-top:2px;">${s.label}</div>
      </div>
      <div class="fd saldo-val">${w(c)}</div>
    </div>`:c===0?'<div style="text-align:center;padding:14px;font-size:14px;color:#2d4a2b;font-weight:600;margin-top:10px;">\u2705 Pagamento conclu\xEDdo</div>':""}
  </div>

  ${i.notes&&!i.notes.startsWith("\u{1F310}")?`
  <!-- OBSERVA\xC7\xD5ES -->
  <div class="card">
    <div class="section-label">Observa\xE7\xF5es / Detalhes da arte</div>
    <div class="obs-text">${i.notes.replace(/</g,"&lt;")}</div>
  </div>`:""}

  <!-- RODAP\xC9 -->
  <div class="footer">
    <div style="margin-bottom:6px;">\u2702\uFE0F <strong>Malharia Queiroz</strong> \u2014 Uniformes &amp; Camisetas Premium</div>
    <div>Vila Taboca, Rua Belo Horizonte, Setor Minas Gerais</div>
    <div>S\xE3o F\xE9lix do Xingu \u2014 Par\xE1 \u2014 Brasil</div>
    <div style="margin-top:8px;">\u{1F4F1} (94) 99132-2940 &nbsp;\xB7&nbsp; \u{1F4F8} @malhariaqueiroz2024</div>
    <div style="margin-top:12px;font-size:11px;color:#a8a29e;">Documento gerado em ${new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"long",year:"numeric"})}</div>
  </div>

</div>

<!-- BARRA INFERIOR FIXA -->
<div class="print-bar">
  <button class="btn-print" onclick="window.print()">\u{1F4C4} Salvar / Imprimir PDF</button>
  ${navigator&&navigator.share?'<button class="btn-share" onclick="shareDoc()">\u{1F4E4} Compartilhar</button>':""}
</div>

}
